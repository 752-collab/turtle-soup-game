一、背景
产品：AI 沉浸式海龟汤，PC 网页 / 移动 H5 / 微信小程序三端一致；无题材与手动难度选择；单局最多 20 次提问；第 6/10/15 次提问后由后端推送阶段提示（通关当回合不推）；AI 回答仅 是/否/无关；对局状态以后端为唯一权威，前端只负责展示、发请求与按 gameStatus 做交互冻结。
与文档关系：实现须遵守 AGENTS.md 的「不推断状态机、不剧透、幂等 clientTurnIndex、Reveal 仅展示落库 soupTruthText」等约束；页面与视觉基调以 PRD（微恐暗色、萤火虫动效、剩余≤5 心跳音效等）与 tech-design-ai-turtle-soup.txt 的 API/状态字段为准。
二、技术栈
层级	选型
框架	Taro 3 + React 18 + TypeScript（与 TECH 中「小程序用 Taro、复用 React 逻辑」一致）
样式	Tailwind CSS（与 PRD 一致）；小程序端需采用 Taro 兼容方案（如 PostCSS + 小程序可用的 Tailwind 插件，避免在小程序里直接使用浏览器专有 API）
动效	Canvas 萤火虫背景（PRD）；注意性能与开关（PRD 要求可关动效）
请求	Taro.request 或轻量封装（统一 BaseURL、错误处理）；禁止在前端推导通关/失败/是否可提问，一律以接口返回的 gameStatus、questionUsed、questionRemaining 为准
构建目标	至少打通 H5（npm run dev:h5）；按需再配 微信小程序（需本机微信开发者工具）
建议 Node 版本：Node 18 LTS 或 20 LTS（与当前 Taro 生态常见要求一致）。

三、具体要求（可直接复制给 AI 执行）
3.1 初始化工程
在仓库中新建前端目录（例如 miniapp/ 或 apps/miniapp/），使用 Taro 官方模板创建 React + TypeScript 项目（通过 @tarojs/cli 的 init 流程）。
配置 路径别名（如 @/ 指向 src/），开启 严格 TypeScript（strict: true）。
集成 Tailwind CSS：配置 tailwind.config、postcss.config，并按 Taro 文档处理 小程序/H5 双端 class 兼容（避免仅 H5 可用）。
新增环境变量（示例名，可按团队规范调整）：
TARO_APP_API_BASE_URL：指向 game-api 根地址（开发期可为 http://localhost:端口）。
配置 代理（仅开发）：H5 dev server 将 /api 代理到后端，避免浏览器跨域；生产环境由网关或同域部署解决。
3.2 需要安装的依赖（在 package.json 中落实）
已有：Taro 3 核心包、react、react-dom、typescript（由模板带入）。
建议新增：
样式：tailwindcss、postcss、autoprefixer；若做小程序 Tailwind，增加团队选定的 Taro 小程序 Tailwind 集成包（按官方/社区成熟方案选一，保证能编译微信小程序）。
可选：clsx 或 classnames（条件 class）。
不要为「游戏逻辑」引入会鼓励在前端算状态的重型状态库；若需要，仅用极简全局状态存 gameId、展示用缓存，通关/失败/是否可问以后端为准。
3.3 目录与模块（核心任务）
src/services/api.ts（或等价）

封装 POST /games：创建局。
封装 POST /games/{gameId}/questions：body 含 questionText、clientTurnIndex（幂等，与 TECH §7.2 / AGENTS 一致）。
封装 POST /games/{gameId}/reveal：揭晓。
所有响应类型用 TS 定义字段：gameStatus、questionUsed、questionRemaining、soupFace/soupTitle、soupTruthText（仅 reveal）、对话列表、postGamePromptText 等（与 tech-design-ai-turtle-soup.txt §7 对齐，字段名以后端实际 OpenAPI/契约为准时可再改类型名不改语义）。
src/pages/index（大厅）

仅 PRD 要求：品牌区 + slogan + 「开始推理」 单按钮；萤火虫 Canvas + 暗色主题；点击调用 POST /games，成功后带 gameId 跳转对局页。
src/pages/play（对局）

展示：soupTitle、当前难度档位（后端返回的 difficultyTier 等）、剩余提问（用服务端 questionRemaining 与 questionUsed，公式与 TECH §6.2 一致：questionRemaining = 20 - questionUsed 若后端未直接给剩余则以前端仅做展示计算且以后端同步值为准）。
对话区：玩家左、AI 右；阶段提示单独样式（微光区分）。
底部输入：非空才可发送；发送时递增维护 clientTurnIndex（从 0 或 1 起与后端约定一致，整局单调），失败重试沿用同 index 以保证幂等。
交互冻结：当 gameStatus 非 playing 或 questionUsed >= 20 或接口报错为「不可再问」时，禁用输入与发送；不得仅依赖前端计数允许继续提问。
src/pages/reveal（揭晓）

进入时调用 POST /games/{gameId}/reveal；soupTruthText 原文展示，不做润色、不二次请求 AI 生成。
展示对话回放与统计（以后端返回为准）。
底部：再来一局、返回大厅；进入本页后按 TECH 异步触发 preload-next-game（或文档中的预加载接口路径，与后端对齐），不阻塞首屏渲染。
src/components/FireflyCanvas（或等价）

Canvas 萤火虫动效 + PRD 要求的「可关闭」开关（可先做本地 localStorage，后续再接用户体系）。
app.config / 路由

注册上述三页路由；默认入口为大厅。
3.4 启动命令（写进 README 或 package.json scripts，保证可执行）
安装依赖：npm install 或 pnpm install（与锁文件一致）。
H5 开发：npm run dev:h5（或项目生成命令），浏览器可打开控制台无致命报错。
微信小程序：npm run dev:weapp + 用微信开发者工具打开 dist 目录（若团队暂只做 H5，可注明「小程序为下一阶段」）。
3.5 与后端的协作前提
本地先启动 game-api（或 mock server），TARO_APP_API_BASE_URL 指向可访问地址；否则至少提供 mock JSON 使三页能联调渲染（mock 也必须返回完整 gameStatus 字段，避免前端瞎猜）。
四、验收标准
可启动：在干净环境下 install 后，H5 开发模式能启动并在浏览器打开首页，无编译失败、无未处理的全局报错。
三页贯通：大厅 → 创建局进对局 → 模拟或真实接口多轮提问 → 进入揭晓 → 返回大厅或「再来一局」流程可走通（接口失败时有可见错误提示，不白屏）。
权威与冻结：对局页展示的剩余次数、是否可输入，与最后一次接口返回一致；手动改本地 state 不能绕过「已完成/已 reveal」应有的禁用（刷新后以后端为准）。
幂等意识：提问请求带 clientTurnIndex；快速双击发送时行为符合后端幂等契约（不重复扣次、不重复插对话，以后端为准）。
Reveal 合规：揭晓页展示 soupTruthText 为接口原文，无前端拼接改写「真相」文案。
PRD 视觉最小集：暗色主色 + 大厅单按钮 + 对局顶部计数器（≤5 时红色加粗可先做）+ 萤火虫组件可开关（音效可占位或后续接）。
符合 AGENTS.md：前端无自研「通关判定」逻辑；不在日志或 UI 中暴露 judgementTruthJson 等剧透结构。
补充：若你希望仓库里也有 Markdown 版 PRD/技术设计，可把 PRD.md.pdf 导出为 PRD.md，并把 tech-design-ai-turtle-soup.txt 复制或重命名为 TECH_DESIGN.md，便于以后 Agent 统一引用文件名。